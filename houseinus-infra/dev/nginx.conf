# WebSocket 요청일 때만 "Connection: upgrade" 보내고, 그 외는 기본 keep-alive.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      '';
}

# 앞단에 또 다른 reverse proxy(https terminate)가 있는 구조라
# 그 proxy가 보낸 X-Forwarded-Proto가 있으면 그대로 trust해서 FastAPI에 전달.
# 없을 때만 자신의 $scheme(http)로 fallback. og:image 등 절대 URL이
# 원래 클라이언트가 사용한 https로 생성되게 하기 위함.
map $http_x_forwarded_proto $effective_scheme {
    default $scheme;
    ~.      $http_x_forwarded_proto;
}

server {
    listen 80;
    server_name localhost;

    root /app/dist;
    index index.html;

    # /api/... and /uploads/... → 호스트에서 실행 중인 houseinus-api (dev: 39080)
    location ~ ^/(api|uploads)/ {
        proxy_pass http://host.docker.internal:39080;

        # 매물 이미지 업로드용. API의 storage.max_upload_bytes와 동일하게.
        client_max_body_size 30M;

        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $effective_scheme;

        # WebSocket upgrade
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # SSE (text/event-stream) streaming: 응답 버퍼링/캐시 비활성화
        proxy_buffering off;
        proxy_cache     off;

        # WS/SSE 장시간 idle 허용
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
    }

    location = /sitemap.xml {
        proxy_pass http://host.docker.internal:39080/sitemap.xml;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $effective_scheme;
    }

    location = /robots.txt {
        try_files /robots.dev.txt =404;
    }

    # 동적 OG 메타태그 주입: 매물/블로그 상세 페이지는 API가
    # dist/index_for_api.html을 읽어 제목/이미지를 치환해 응답.
    # 카카오톡/페이스북 등 미리보기 크롤러가 실제 글/매물 제목을 볼 수 있도록.
    # /properties/<id-or-slug> 만 매칭 (print/upload 하위 경로 제외).
    location ~ ^/properties/[^/]+/?$ {
        proxy_pass http://host.docker.internal:39080;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $effective_scheme;
    }

    # 납품 링크 /properties/<id>/delivery?token=...
    # 고객에게 카톡 등으로 보내는 token-gated 매물 페이지. 미리보기에 매물
    # 제목/대표 이미지가 뜨도록 API가 token으로 매물을 조회해 OG 태그 주입.
    location ~ ^/properties/[^/]+/delivery/?$ {
        proxy_pass http://host.docker.internal:39080;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $effective_scheme;
    }

    # 집소개서 활용 가이드: 정적 페이지지만 OG 메타태그 주입을 위해 API로 프록시.
    location = /guide/delivery {
        proxy_pass http://host.docker.internal:39080;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $effective_scheme;
    }

    # /blog/<slug>만 매칭. /blog (index)와 /blog/tag/* 는 제외해서 SPA로 흘려보냄.
    location ~ ^/blog/(?!tag(?:/|$))[^/]+/?$ {
        proxy_pass http://host.docker.internal:39080;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $effective_scheme;
    }

    location / {
        try_files $uri $uri/index.html /index.html;
    }

    # optional: gzip (SSE는 text/event-stream이라 아래 타입에 안 걸려 영향 없음)
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
}
