version: '3'
services:
  nginx:
    image: nginx:latest
    container_name: houseinus-nginx
    ports:
      - "30080:80"
    volumes:
      - /home/yeibeen/serve/prod-apps/houseinus-web:/app:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    # Linux에서 host.docker.internal을 호스트 게이트웨이로 해석시켜 호스트의
    # houseinus-api (127.0.0.1:38080)로 proxy 가능하게 만듦.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped