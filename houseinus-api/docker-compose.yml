services:
  postgres:
    image: postgres:16-alpine
    container_name: houseinus-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: houseinusdev
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: devpassword
    ports:
      - "8432:5432"
    volumes:
      - houseinus_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dev -d houseinusdev"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: houseinus-redis
    restart: unless-stopped
    ports:
      - "8379:6379"
    volumes:
      - houseinus_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  houseinus_postgres_data:
  houseinus_redis_data:
